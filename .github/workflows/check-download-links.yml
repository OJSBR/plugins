name: Check download links

# Every OJSBR plugin repository must offer a direct link to its installable
# package (/releases/download/<tag>/<file>.tar.gz) in the README — a link to the
# releases page is not enough. This job checks that for the whole organization,
# and also validates the direct links used in this catalog, so a broken or stale
# link is caught instead of being found by someone trying to install a plugin.

on:
  schedule:
    # Mondays, 09:00 UTC
    - cron: '0 9 * * 1'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'scripts/check-download-links.py'
      - '.github/workflows/check-download-links.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check direct download links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check-download-links.py
